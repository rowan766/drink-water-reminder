<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: "Microsoft YaHei", "Segoe UI", sans-serif;
      background: transparent;
      overflow: hidden;
    }

    .card {
      height: 100%;
      display: flex;
      flex-direction: column;
      background: #fff;
      border: 1px solid #c8d6e8;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, .18);
      overflow: hidden;
      animation: slideIn .2s ease-out;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    /* 顶部标题栏 */
    .top-bar {
      background: linear-gradient(135deg, #0078D4, #005a9e);
      padding: 11px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .top-bar .icon  { font-size: 18px; }
    .top-bar .title { color: #fff; font-size: 13px; font-weight: 600; letter-spacing: .3px; }

    /* 消息区 */
    .body {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px 20px;
    }
    #message {
      font-size: 14px;
      color: #333;
      text-align: center;
      line-height: 1.65;
      word-break: break-all;
    }

    /* 按钮区 */
    .footer {
      padding: 0 20px 16px;
      display: flex;
      justify-content: center;
    }
    #btnAck {
      background: #0078D4;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 36px;
      font-size: 13px;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: .5px;
      transition: opacity .15s, transform .1s;
    }
    #btnAck:hover  { opacity: .88; }
    #btnAck:active { transform: scale(.96); }
  </style>
</head>
<body>
  <div class="card">

    <div class="top-bar">
      <span class="icon">💧</span>
      <span class="title">休息一下</span>
    </div>

    <div class="body">
      <div id="message">正在加载…</div>
    </div>

    <div class="footer">
      <button id="btnAck">我知道了</button>
    </div>

  </div>
  <script>
    window.reminderAPI.getMessage().then(msg => {
      document.getElementById('message').textContent = msg;
    });
    document.getElementById('btnAck').addEventListener('click', () => {
      window.reminderAPI.close();
    });
  </script>
</body>
</html>
